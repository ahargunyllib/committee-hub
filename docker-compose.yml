services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: committee_hub
    ports:
      - "5432:5432"
    volumes:
      - committee_hub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d committee_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  committee_hub_postgres_data:
